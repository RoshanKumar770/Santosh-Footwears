services:
  web:
    build: .
    container_name: santosh-footwears
    ports:
      - "80:80"
    restart: unless-stopped

  dev:
    image: node:20-alpine
    container_name: santosh-footwears-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev